tasks:
  - id: T6
    description: |
      Desktop first-run wizard (T9 of docs/desktop-wrapper-design.md).
      Supervisor (desktop/supervisor.ts), server-entry (desktop/server-entry.cjs)
      and settings (desktop/settings.ts) already exist. Missing piece: the
      first-launch UX that lets the operator pick:
        1. data dir          (LARIAT_DATA_DIR)
        2. python path       (LARIAT_PYTHON; defaults to `which python3`)
        3. data-pack dir     (the off-tree SSD location for BGE vectors +
                              parquet files)

      Build the React component at desktop/firstRunWizard/{App.tsx,
      main.tsx, vite.config.ts} per the design doc; have supervisor.ts
      launch it when settings.json doesn't exist yet. Persist user
      choices via desktop/settings.ts writeSettings(). Unit-test the
      pure-fn validator (path exists + is writable for data dir;
      python --version returns 3.x for python path).
    acceptance_tests:
      - node --experimental-strip-types --test desktop/__tests__/test-first-run-validator.mjs
      - npm run desktop:build
    dependencies: []
    paths_touched:
      - desktop/firstRunWizard/App.tsx
      - desktop/firstRunWizard/main.tsx
      - desktop/firstRunWizard/vite.config.ts
      - desktop/supervisor.ts
      - desktop/__tests__/test-first-run-validator.mjs

  - id: T7
    description: |
      Multi-instance sync impl. lib/syncFeed.ts has the type shape +
      stub appendOp/replaySince that throw `never` today (per
      docs/multi-instance-sync.md). Land the schema + impl + peer-auth:

      - schema migration: sync_feed table + replay_checkpoints table
        in lib/db.ts, additive ALTERs via migrateLegacyColumns.
      - impl: appendOp(op) — write inside the same tx as the source
        write so the change-feed row commits atomically with the
        operation.
      - impl: replaySince(peerId, fromRowId) — advances per-peer
        replay_checkpoints row, returns the slice.
      - Family-1 (HACCP) append-only, Family-2 (financial) LWW,
        Family-3 (live-state) LWW per the design doc.
      - app/api/peers/sync-since/route.js — accepts X-Lariat-Peer-Key
        + X-Lariat-Signature headers; verifies via lib/peerKeypair.ts
        signProof/verifyProof; allowlists peer pubkey fingerprints via
        a new peer_trust table seeded from an operator action.
      - tests: appendOp/replaySince round-trip, family-specific conflict
        rules, route auth (401 missing sig, 401 unknown fingerprint,
        200 valid signed request).

      Effort: M+ — needs schema migration + design choices the dev team
      should sign off on (e.g. when LWW competes with replaces_id).
    acceptance_tests:
      - node --experimental-strip-types --test tests/js/test-sync-feed.mjs
      - node --experimental-strip-types --test tests/js/test-peer-auth.mjs
    dependencies: []
    paths_touched:
      - lib/db.ts
      - lib/syncFeed.ts
      - app/api/peers/sync-since/route.js
      - tests/js/test-sync-feed.mjs
      - tests/js/test-peer-auth.mjs

  - id: T8
    description: |
      Cloud-bridge production wiring. lib/cloudBridgePush.ts +
      cloudBridgeDrainer.ts + cloudBridgeDrainerLifecycle.ts +
      cloudBridgeQueue.ts + scripts/cloud-bridge-drainer.mjs all exist.
      Remaining:

      - HMAC secret in desktop/settings.ts (LARIAT_CLOUD_HMAC) instead
        of env var. Surface a settings toggle on /management.
      - Drainer crash-resume — record claim/ack state durably in
        cloud_bridge_queue so a restart doesn't re-deliver acked rows.
        Today the unref'd setInterval gets dropped on shutdown; the
        next start re-claims rows whose claim is older than
        staleClaimAgeSec. Add a graceful-stop hook that nack's any
        in-flight claims so they're available immediately on restart.
      - Drainer lifecycle from launchd/systemd, NOT cron (drainer is
        long-running; cron is for short jobs). Add an
        examples/launchd-cloud-bridge.plist template + install script.

      Effort: M — touches lib + desktop + ops scaffolding. Skipping
      cron registration because the drainer holds the event loop open
      until SIGTERM/SIGINT.
    acceptance_tests:
      - npm run test:cloud-bridge-push
      - npm run test:cloud-bridge-drainer
    dependencies: []
    paths_touched:
      - lib/cloudBridgePush.ts
      - lib/cloudBridgeDrainer.ts
      - desktop/settings.ts
      - app/management/page.jsx
      - examples/launchd-cloud-bridge.plist
