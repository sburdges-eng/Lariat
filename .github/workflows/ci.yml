# PR + main-push CI gate. Mirrors the local pre-commit + `npm run verify`
# discipline so a regression that slips past a developer's machine still gets
# caught before merge.
#
# Steps run as discrete jobs (rather than `npm run verify` as one) so a red
# build points cleanly at which gate failed. Order matches the verify
# script: typecheck → jest → rule tests → schema migrations → next build.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · tests · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: jest unit tests
        run: npm run test:unit

      - name: HACCP rule tests
        run: npm run test:rules

      - name: purchasing vendor compare + mapping tests
        run: npm run test:purchasing-vendor

      - name: KDS bump protocol route test
        run: npm run test:kds-bump

      - name: backup integrity + restore drill test
        run: npm run test:backup

      - name: Sick-note retention report test
        run: npm run test:sick-note-retention

      - name: PIN-gate coverage (mutation-route drift detector)
        run: npm run test:pin-gates

      - name: checkjs api baseline (ts-nocheck drift detector)
        run: npm run test:checkjs-api

      - name: idempotency coverage (mutation-route drift detector)
        run: npm run test:idempotency

      # Security/correctness suites (node:test) that jest's app/__tests__
      # testMatch never swept and no workflow named — so they ran in no gate.
      # DB-safe (in-memory/tmp only), verified green before wiring.
      - name: security + sync/replication regression suites
        run: npm run test:regression-core

      - name: 86 sub-recipe cascade tests
        run: npm run test:sub-recipe-graph

      - name: schema-migration idempotency
        run: npm run test:schema

      - name: BEO estimate + food-cost + min-spend tests
        run: npm run test:beo

      - name: costing engine + unit-conversion tests
        run: npm run test:costing

      - name: recipe BOM audit (index ↔ normalized ↔ expand)
        run: npm run test:recipe-bom-audit

      - name: install python test deps
        run: bash scripts/install-python-deps.sh

      # tests/python (ingest parsers, BOM expand, cascade CLI, normalizers,
      # datapack index builders). The live-DB seed-coverage check self-skips
      # when data/lariat.db is absent (gitignored) but FAILS on an empty one
      # by design. An earlier node:test suite can leave a stray schema-only
      # data/lariat.db, so remove it first to restore the clean/absent state.
      - name: python test suite
        run: |
          rm -f data/lariat.db data/lariat.db-wal data/lariat.db-shm
          npm run test:python

      - name: stamp build version (V.I.NN.NNN)
        run: npm run version:stamp

      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
