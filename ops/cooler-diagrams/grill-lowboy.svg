<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E8E1D4" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- paper -->
  <rect width="960" height="640" fill="#FAF6EC"/>
  <rect width="960" height="640" fill="url(#grid)"/>

  <!-- title -->
  <g transform="translate(32,28)">
    <text font-size="10" letter-spacing="2" fill="#8E4A1E">LARIAT · OPS · GRILL / SAUTE</text>
    <text y="22" font-size="22" font-weight="600" fill="#1C1A17">Grill Lowboy + Roll Top</text>
    <text y="42" font-size="11" fill="#5E554A">proteins (lowboy) · noodles &amp; backups (roll top) · fish on ice</text>
  </g>

  <!-- registration -->
  <g stroke="#1C1A17" stroke-width="1" fill="none">
    <path d="M 24 96 h 12 M 30 90 v 12"/>
    <path d="M 936 96 h -12 M 930 90 v 12"/>
    <path d="M 24 616 h 12 M 30 610 v 12"/>
    <path d="M 936 616 h -12 M 930 610 v 12"/>
  </g>

  <!-- LOWBOY (cold) -->
  <g transform="translate(60,108)">
    <rect width="840" height="268" fill="#E7EEF1" stroke="#1C1A17" stroke-width="2"/>
    <text x="12" y="18" font-size="9" letter-spacing="2" fill="#3B5B6B">LOWBOY · 32–41°F · UNDER THE GRILL</text>

    <!-- Top shelf -->
    <g>
      <line x1="0" y1="40" x2="840" y2="40" stroke="#1C1A17"/>
      <line x1="0" y1="140" x2="840" y2="140" stroke="#1C1A17"/>
      <line x1="280" y1="40" x2="280" y2="140" stroke="#1C1A17"/>
      <line x1="560" y1="40" x2="560" y2="140" stroke="#1C1A17"/>
      <text x="140" y="60" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3B5B6B">PROTEIN BACKUPS · A</text>
      <text x="140" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">2/3 Burgers</text>
      <text x="140" y="112" text-anchor="middle" font-size="11" fill="#5E554A">portioned · paper-stacked</text>
      <text x="140" y="128" text-anchor="middle" font-size="10" fill="#5E554A">cook ground to 155°F</text>

      <text x="420" y="60" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3B5B6B">PROTEIN BACKUPS · B</text>
      <text x="420" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">1/3 Jeffe</text>
      <text x="420" y="112" text-anchor="middle" font-size="11" fill="#5E554A">marinated · trays</text>

      <text x="700" y="60" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3B5B6B">PROTEIN BACKUPS · C</text>
      <text x="700" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">1/3 Bacon</text>
      <text x="700" y="112" text-anchor="middle" font-size="11" fill="#5E554A">par-cooked · trays</text>
    </g>

    <!-- Bottom shelf -->
    <g>
      <line x1="0" y1="240" x2="840" y2="240" stroke="#1C1A17"/>
      <line x1="420" y1="140" x2="420" y2="240" stroke="#1C1A17"/>
      <text x="210" y="160" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3B5B6B">LINE PAR · LEFT</text>
      <text x="210" y="190" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">6 orders Chicken</text>
      <text x="210" y="212" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">6 orders Cod</text>
      <text x="210" y="230" text-anchor="middle" font-size="10" fill="#5E554A">portioned · fish on ice bath</text>

      <text x="630" y="160" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3B5B6B">LINE PAR · RIGHT</text>
      <text x="630" y="190" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">5 orders Trout</text>
      <text x="630" y="212" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">5 orders Pork chop</text>
      <text x="630" y="230" text-anchor="middle" font-size="10" fill="#5E554A">trout on ice · pork chop wax paper</text>
    </g>

    <text x="420" y="258" text-anchor="middle" font-size="9" fill="#5E554A">HACCP top-down: RTE → seafood → whole cuts → ground → poultry · honor even in lowboy</text>
  </g>

  <!-- ROLL TOP -->
  <g transform="translate(60,396)">
    <rect width="840" height="184" fill="#F3EEDF" stroke="#1C1A17" stroke-width="2"/>
    <text x="12" y="18" font-size="9" letter-spacing="2" fill="#8E7A54">ROLL TOP · BACKUPS &amp; NOODLES · AMBIENT/WARM</text>

    <g>
      <line x1="280" y1="30" x2="280" y2="184" stroke="#1C1A17"/>
      <line x1="560" y1="30" x2="560" y2="184" stroke="#1C1A17"/>

      <text x="140" y="54" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">CELL 1</text>
      <text x="140" y="96" text-anchor="middle" font-size="18" font-weight="600" fill="#1C1A17">Noodles</text>
      <text x="140" y="118" text-anchor="middle" font-size="11" fill="#5E554A">par-cooked · oiled</text>
      <text x="140" y="142" text-anchor="middle" font-size="10" fill="#5E554A">4 qt · portion bags</text>

      <text x="420" y="54" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">CELL 2</text>
      <text x="420" y="96" text-anchor="middle" font-size="18" font-weight="600" fill="#1C1A17">Burger prep</text>
      <text x="420" y="118" text-anchor="middle" font-size="11" fill="#5E554A">buns · lettuce · pickles</text>
      <text x="420" y="142" text-anchor="middle" font-size="10" fill="#5E554A">crumble bacon if on 86</text>

      <text x="700" y="54" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">CELL 3</text>
      <text x="700" y="96" text-anchor="middle" font-size="18" font-weight="600" fill="#1C1A17">1 qt Shredded cheese</text>
      <text x="700" y="118" text-anchor="middle" font-size="11" fill="#5E554A">blend · melts</text>
      <text x="700" y="142" text-anchor="middle" font-size="10" fill="#5E554A">deli · lid when idle</text>
    </g>
  </g>

  <!-- footer legend -->
  <g transform="translate(60,610)" font-size="10" fill="#5E554A">
    <rect x="0" y="-10" width="14" height="12" fill="#E7EEF1" stroke="#1C1A17"/>
    <text x="20" y="0">cold 32–41°F</text>
    <rect x="140" y="-10" width="14" height="12" fill="#F3EEDF" stroke="#1C1A17"/>
    <text x="160" y="0">roll top · ambient</text>
    <text x="320" y="0">fish on ice · par items first-pulled</text>
  </g>
</svg>
