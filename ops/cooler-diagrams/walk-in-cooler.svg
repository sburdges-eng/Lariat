<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E8E1D4" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- paper -->
  <rect width="960" height="720" fill="#FAF6EC"/>
  <rect width="960" height="720" fill="url(#grid)"/>

  <!-- title block -->
  <g transform="translate(32,28)">
    <text font-size="10" letter-spacing="2" fill="#3B5B6B">LARIAT · OPS · WALK-IN COOLER</text>
    <text y="22" font-size="22" font-weight="600" fill="#1C1A17">Walk-in Cooler — Shelf Plan</text>
    <text y="42" font-size="11" fill="#5E554A">32–41°F · HACCP top-to-bottom order · every day, every receiver</text>
  </g>

  <!-- registration -->
  <g stroke="#1C1A17" stroke-width="1" fill="none">
    <path d="M 24 96 h 12 M 30 90 v 12"/>
    <path d="M 936 96 h -12 M 930 90 v 12"/>
    <path d="M 24 696 h 12 M 30 690 v 12"/>
    <path d="M 936 696 h -12 M 930 690 v 12"/>
  </g>

  <!-- HACCP direction arrow -->
  <g transform="translate(80,110)">
    <text font-size="9" letter-spacing="2" fill="#B7472A">HACCP ORDER — TOP TO BOTTOM</text>
    <g stroke="#B7472A" stroke-width="1.2" fill="none">
      <line x1="0" y1="14" x2="0" y2="548"/>
      <path d="M -4 544 L 0 554 L 4 544 z" fill="#B7472A" stroke="none"/>
    </g>
  </g>

  <!-- shelf rack outline -->
  <rect x="110" y="108" width="800" height="560" fill="none" stroke="#1C1A17" stroke-width="2"/>

  <!-- SHELF 1 · RTE -->
  <g transform="translate(110,108)">
    <rect width="800" height="92" fill="#F3EEDF" stroke="#1C1A17"/>
    <text x="14" y="22" font-size="9" letter-spacing="2" fill="#8E7A54">SHELF 01 · TOP</text>
    <text x="14" y="52" font-size="18" font-weight="600" fill="#1C1A17">Ready-to-eat (RTE)</text>
    <text x="14" y="74" font-size="10" fill="#5E554A">greens · pre-cut fruit · cheese · desserts · cooked/cooled product ready to serve</text>
    <g transform="translate(520,22)" font-size="10" fill="#5E554A">
      <text>salad mix · hummus</text>
      <text y="16">cut melon · pastry</text>
      <text y="32">sliced deli · butters</text>
      <text y="48">prepped sauces</text>
    </g>
  </g>

  <!-- SHELF 2 · Seafood -->
  <g transform="translate(110,204)">
    <rect width="800" height="92" fill="#E7EEF1" stroke="#1C1A17"/>
    <text x="14" y="22" font-size="9" letter-spacing="2" fill="#3B5B6B">SHELF 02</text>
    <text x="14" y="52" font-size="18" font-weight="600" fill="#1C1A17">Seafood</text>
    <text x="14" y="74" font-size="10" fill="#5E554A">cod · trout · anything cooked lowest (145°F for 15 sec)</text>
    <g transform="translate(520,22)" font-size="10" fill="#5E554A">
      <text>cod fillets on ice</text>
      <text y="16">trout whole · iced</text>
      <text y="32">par: 12 fish &amp; chip</text>
      <text y="48">par: 15 fish taco</text>
    </g>
  </g>

  <!-- SHELF 3 · Whole cuts -->
  <g transform="translate(110,300)">
    <rect width="800" height="92" fill="#E7EEF1" stroke="#1C1A17"/>
    <text x="14" y="22" font-size="9" letter-spacing="2" fill="#3B5B6B">SHELF 03</text>
    <text x="14" y="52" font-size="18" font-weight="600" fill="#1C1A17">Whole cuts — beef, pork</text>
    <text x="14" y="74" font-size="10" fill="#5E554A">steaks · pork chops · 145°F for 15 sec · surface pathogens only</text>
    <g transform="translate(520,22)" font-size="10" fill="#5E554A">
      <text>pork chops · wax paper</text>
      <text y="16">steak portions · trays</text>
      <text y="32">brined pig wing</text>
      <text y="48">jeffe marinade</text>
    </g>
  </g>

  <!-- SHELF 4 · Ground -->
  <g transform="translate(110,396)">
    <rect width="800" height="92" fill="#E7EEF1" stroke="#1C1A17"/>
    <text x="14" y="22" font-size="9" letter-spacing="2" fill="#3B5B6B">SHELF 04</text>
    <text x="14" y="52" font-size="18" font-weight="600" fill="#1C1A17">Ground meats</text>
    <text x="14" y="74" font-size="10" fill="#5E554A">burger patties · ground beef · sausage · 155°F for 15 sec · pathogens mixed through</text>
    <g transform="translate(520,22)" font-size="10" fill="#5E554A">
      <text>burger patties · stacked</text>
      <text y="16">chorizo · bulk</text>
      <text y="32">breakfast sausage</text>
      <text y="48">bacon par · prep'd</text>
    </g>
  </g>

  <!-- SHELF 5 · Poultry -->
  <g transform="translate(110,492)">
    <rect width="800" height="92" fill="#F7E3DB" stroke="#1C1A17"/>
    <text x="14" y="22" font-size="9" letter-spacing="2" fill="#B7472A">SHELF 05 · BOTTOM</text>
    <text x="14" y="52" font-size="18" font-weight="600" fill="#1C1A17">Poultry</text>
    <text x="14" y="74" font-size="10" fill="#5E554A">chicken · turkey · 165°F for 15 sec · any drip isolated under all other product</text>
    <g transform="translate(520,22)" font-size="10" fill="#5E554A">
      <text>whole chicken · boned</text>
      <text y="16">floured chicken portions</text>
      <text y="32">wings · thighs</text>
      <text y="48">floor drip-tray under</text>
    </g>
  </g>

  <!-- Floor zone -->
  <g transform="translate(110,592)">
    <rect width="800" height="76" fill="#FAF6EC" stroke="#1C1A17" stroke-dasharray="3 3"/>
    <text x="400" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#5E554A">FLOOR · NOTHING BUT SEALED CONTAINERS</text>
    <text x="400" y="52" text-anchor="middle" font-size="10" fill="#5E554A">stock buckets · boxed produce in original cases · 6" off the floor (dunnage)</text>
  </g>

  <!-- Rules aside -->
  <g transform="translate(60,686)" font-size="10" fill="#5E554A">
    <text x="0" y="0">Rules: label + date everything · FIFO front-to-back · first day you see chicken above lettuce, fix it before anything else</text>
  </g>
</svg>
