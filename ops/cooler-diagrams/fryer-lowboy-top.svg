<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E8E1D4" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- paper -->
  <rect width="960" height="420" fill="#FAF6EC"/>
  <rect width="960" height="420" fill="url(#grid)"/>

  <!-- title block -->
  <g transform="translate(32,28)">
    <text font-size="10" letter-spacing="2" fill="#8E7A54">LARIAT · OPS · FRY</text>
    <text y="22" font-size="22" font-weight="600" fill="#1C1A17">Fryer Lowboy — Top Pan</text>
    <text y="42" font-size="11" fill="#5E554A">6 cells · single row · 32–41°F · cooks reach left-to-right</text>
  </g>

  <!-- registration ticks -->
  <g stroke="#1C1A17" stroke-width="1" fill="none">
    <path d="M 24 96 h 12 M 30 90 v 12"/>
    <path d="M 936 96 h -12 M 930 90 v 12"/>
    <path d="M 24 396 h 12 M 30 390 v 12"/>
    <path d="M 936 396 h -12 M 930 390 v 12"/>
  </g>

  <!-- flow arrow above -->
  <g transform="translate(0,140)" stroke="#B7472A" stroke-width="1.2" fill="none">
    <line x1="80" y1="0" x2="880" y2="0" stroke-dasharray="4 4" opacity="0.5"/>
  </g>
  <text x="480" y="136" text-anchor="middle" font-size="9" letter-spacing="3" fill="#B7472A">FRY STATION REACH · L → R</text>

  <!-- pan outline -->
  <rect x="80" y="160" width="800" height="200" fill="#E7EEF1" stroke="#1C1A17" stroke-width="2"/>

  <!-- dividers -->
  <line x1="213" y1="160" x2="213" y2="360" stroke="#1C1A17"/>
  <line x1="346" y1="160" x2="346" y2="360" stroke="#1C1A17"/>
  <line x1="480" y1="160" x2="480" y2="360" stroke="#1C1A17"/>
  <line x1="613" y1="160" x2="613" y2="360" stroke="#1C1A17"/>
  <line x1="746" y1="160" x2="746" y2="360" stroke="#1C1A17"/>

  <!-- cell 1 -->
  <g transform="translate(80,160)">
    <text x="66" y="26" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">01</text>
    <text x="66" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">Batter</text>
    <text x="66" y="122" text-anchor="middle" font-size="10" fill="#5E554A">beer · Guinness · vodka</text>
    <text x="66" y="152" text-anchor="middle" font-size="9" fill="#3B5B6B">4 qt · whisk before service</text>
  </g>

  <!-- cell 2 -->
  <g transform="translate(213,160)">
    <text x="66" y="26" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">02</text>
    <text x="66" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">Fish &amp; chip</text>
    <text x="66" y="122" text-anchor="middle" font-size="10" fill="#5E554A">portioned cod</text>
    <text x="66" y="152" text-anchor="middle" font-size="9" fill="#3B5B6B">par 12</text>
  </g>

  <!-- cell 3 -->
  <g transform="translate(346,160)">
    <text x="66" y="26" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">03</text>
    <text x="66" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">Fish taco</text>
    <text x="66" y="122" text-anchor="middle" font-size="10" fill="#5E554A">cod strips</text>
    <text x="66" y="152" text-anchor="middle" font-size="9" fill="#3B5B6B">par 15</text>
  </g>

  <!-- cell 4 -->
  <g transform="translate(480,160)">
    <text x="66" y="26" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">04</text>
    <text x="66" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">Pig wing</text>
    <text x="66" y="122" text-anchor="middle" font-size="10" fill="#5E554A">brined · rested</text>
    <text x="66" y="152" text-anchor="middle" font-size="9" fill="#3B5B6B">par 20</text>
  </g>

  <!-- cell 5 -->
  <g transform="translate(613,160)">
    <text x="66" y="26" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">05</text>
    <text x="66" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">Chicken</text>
    <text x="66" y="122" text-anchor="middle" font-size="10" fill="#5E554A">floured · portioned</text>
    <text x="66" y="152" text-anchor="middle" font-size="9" fill="#3B5B6B">par 18 · cook 165°F</text>
  </g>

  <!-- cell 6 -->
  <g transform="translate(746,160)">
    <text x="66" y="26" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8E7A54">06</text>
    <text x="66" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#1C1A17">Carrot · celery</text>
    <text x="66" y="122" text-anchor="middle" font-size="10" fill="#5E554A">garnish cut</text>
    <text x="66" y="152" text-anchor="middle" font-size="9" fill="#3B5B6B">wing plate</text>
  </g>

  <!-- footer -->
  <g transform="translate(60,398)" font-size="10" fill="#5E554A">
    <rect x="0" y="-12" width="14" height="12" fill="#E7EEF1" stroke="#1C1A17"/>
    <text x="20" y="-2">cold 32–41°F · cover when not on the line · refill at mid-shift</text>
  </g>
</svg>
