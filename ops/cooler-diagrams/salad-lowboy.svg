    <rect x="60" y="240" width="168" height="132" fill="#E9F1E4" stroke="#1C1A17"/>
    <rect x="228" y="240" width="168" height="132" fill="#E9F1E4" stroke="#1C1A17"/>
    <rect x="396" y="240" width="168" height="132" fill="#E9F1E4" stroke="#1C1A17"/>
    <rect x="564" y="240" width="168" height="132" fill="#E9F1E4" stroke="#1C1A17"/>
    <rect x="732" y="240" width="168" height="132" fill="#E9F1E4" stroke="#1C1A17"/>
  </g>
