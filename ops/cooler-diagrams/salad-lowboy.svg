    <text x="144" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Lemon</text>
    <text x="144" y="320" text-anchor="middle" font-size="10" fill="#5E554A">wedges</text>
  </g>
  <g>
    <text x="312" y="260" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R2 · C2</text>
    <text x="312" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Blue cheese</text>
    <text x="312" y="320" text-anchor="middle" font-size="10" fill="#5E554A">crumble</text>
  </g>
  <g>
    <text x="480" y="260" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R2 · C3</text>
    <text x="480" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Eggs</text>
    <text x="480" y="320" text-anchor="middle" font-size="10" fill="#5E554A">hard boil · peeled</text>
  </g>
  <g>
    <text x="648" y="260" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R2 · C4</text>
    <text x="648" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Bacon bits</text>
    <text x="648" y="320" text-anchor="middle" font-size="10" fill="#5E554A">cooked · drained</text>
  </g>
  <g>
    <text x="816" y="260" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R2 · C5</text>
    <text x="816" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Cucumber</text>
    <text x="816" y="320" text-anchor="middle" font-size="10" fill="#5E554A">sliced · rounds</text>
  </g>

  <!-- Row 3: five narrower cells -->
  <g>
    <rect x="60" y="372" width="168" height="136" fill="#E9F1E4" stroke="#1C1A17"/>
    <rect x="228" y="372" width="168" height="136" fill="#E9F1E4" stroke="#1C1A17"/>
    <rect x="396" y="372" width="168" height="136" fill="#E9F1E4" stroke="#1C1A17"/>
    <rect x="564" y="372" width="168" height="136" fill="#E9F1E4" stroke="#1C1A17"/>
    <rect x="732" y="372" width="168" height="136" fill="#E9F1E4" stroke="#1C1A17"/>
  </g>
  <g>
    <text x="144" y="392" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R3 · C1</text>
    <text x="144" y="432" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Lime</text>
    <text x="144" y="452" text-anchor="middle" font-size="10" fill="#5E554A">wedges</text>
  </g>
  <g>
    <text x="312" y="392" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R3 · C2</text>
    <text x="312" y="432" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Cotija</text>
    <text x="312" y="452" text-anchor="middle" font-size="10" fill="#5E554A">crumble</text>
  </g>
  <g>
    <text x="480" y="392" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R3 · C3</text>
    <text x="480" y="432" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Pico</text>
    <text x="480" y="452" text-anchor="middle" font-size="10" fill="#5E554A">made daily</text>
  </g>
  <g>
    <text x="648" y="392" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R3 · C4</text>
    <text x="648" y="432" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Grilled onion</text>
    <text x="648" y="452" text-anchor="middle" font-size="10" fill="#5E554A">charred rings</text>
  </g>
  <g>
    <text x="816" y="392" text-anchor="middle" font-size="9" letter-spacing="2" fill="#3E6B3B">R3 · C5</text>
    <text x="816" y="432" text-anchor="middle" font-size="15" font-weight="600" fill="#1C1A17">Red onion</text>
    <text x="816" y="452" text-anchor="middle" font-size="10" fill="#5E554A">raw · rings</text>
  </g>

  <!-- Below the well: sauces and extras -->
  <g transform="translate(60,528)">
    <rect width="840" height="72" fill="#F3EEDF" stroke="#1C1A17"/>
    <text x="12" y="18" font-size="9" letter-spacing="2" fill="#8E7A54">BELOW LOWBOY</text>
    <g transform="translate(12,34)" font-size="11" fill="#1C1A17">
      <text>Chimichurri</text>
      <text x="140">Heirloom tomatoes</text>
      <text x="300">House dressings</text>
      <text x="460">Citrus supremes</text>
      <text x="620">Pickles (spice &amp; heat)</text>
    </g>
    <text x="12" y="58" font-size="10" fill="#5E554A">sauce squeeze bottles ride in the door rail · rotate FIFO, dated</text>
  </g>

  <!-- footer -->
  <g transform="translate(60,622)" font-size="10" fill="#5E554A">
    <rect x="0" y="-10" width="14" height="12" fill="#E9F1E4" stroke="#1C1A17"/>
    <text x="20" y="0">salad cold line · covered when walked away from · line-check T-30</text>
  </g>
