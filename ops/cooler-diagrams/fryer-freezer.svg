<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E8E1D4" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- paper -->
  <rect width="720" height="560" fill="#FAF6EC"/>
  <rect width="720" height="560" fill="url(#grid)"/>

  <!-- title block -->
  <g transform="translate(32,28)">
    <text font-size="10" letter-spacing="2" fill="#8E7A54">LARIAT · OPS · FRY</text>
    <text y="22" font-size="22" font-weight="600" fill="#1C1A17">Fryer Lowboy Freezer</text>
    <text y="42" font-size="11" fill="#5E554A">3 rows · 2 columns · -10 to 0°F</text>
  </g>

  <!-- registration ticks -->
  <g stroke="#1C1A17" stroke-width="1" fill="none">
    <path d="M 24 96 h 12 M 30 90 v 12"/>
    <path d="M 696 96 h -12 M 690 90 v 12"/>
    <path d="M 24 536 h 12 M 30 530 v 12"/>
    <path d="M 696 536 h -12 M 690 530 v 12"/>
  </g>

  <!-- cabinet outline -->
  <rect x="80" y="120" width="560" height="400" fill="#DFE4EA" stroke="#1C1A17" stroke-width="2"/>

  <!-- shelf dividers -->
  <line x1="80" y1="253" x2="640" y2="253" stroke="#1C1A17" stroke-width="1"/>
  <line x1="80" y1="386" x2="640" y2="386" stroke="#1C1A17" stroke-width="1"/>
  <line x1="360" y1="120" x2="360" y2="520" stroke="#1C1A17" stroke-width="1"/>

  <!-- row 1 -->
  <g transform="translate(80,120)">
    <text x="280" y="20" text-anchor="middle" font-size="9" letter-spacing="3" fill="#3B4F6B">TOP SHELF</text>
    <!-- left -->
    <g transform="translate(20,40)">
      <text font-size="10" letter-spacing="2" fill="#8E7A54">CELL 1</text>
      <text y="24" font-size="18" font-weight="600" fill="#1C1A17">Sweet fries</text>
      <text y="44" font-size="10" fill="#5E554A">bag · backup</text>
    </g>
    <!-- right -->
    <g transform="translate(300,40)">
      <text font-size="10" letter-spacing="2" fill="#8E7A54">CELL 2</text>
      <text y="24" font-size="18" font-weight="600" fill="#1C1A17">Tenders</text>
      <text y="44" font-size="10" fill="#5E554A">breaded · flat</text>
    </g>
  </g>

  <!-- row 2 -->
  <g transform="translate(80,253)">
    <text x="280" y="20" text-anchor="middle" font-size="9" letter-spacing="3" fill="#3B4F6B">MIDDLE SHELF</text>
    <g transform="translate(20,40)">
      <text font-size="10" letter-spacing="2" fill="#8E7A54">CELL 3</text>
      <text y="24" font-size="18" font-weight="600" fill="#1C1A17">Battered fries</text>
      <text y="44" font-size="10" fill="#5E554A">bag · primary</text>
    </g>
    <g transform="translate(300,40)">
      <text font-size="10" letter-spacing="2" fill="#8E7A54">CELL 4</text>
      <text y="24" font-size="18" font-weight="600" fill="#1C1A17">Veggie blend</text>
      <text y="44" font-size="10" fill="#5E554A">fry · broccolini mix</text>
    </g>
  </g>

  <!-- row 3 -->
  <g transform="translate(80,386)">
    <text x="280" y="20" text-anchor="middle" font-size="9" letter-spacing="3" fill="#3B4F6B">BOTTOM SHELF</text>
    <g transform="translate(20,40)">
      <text font-size="10" letter-spacing="2" fill="#8E7A54">CELL 5</text>
      <text y="24" font-size="14" fill="#8E7A54" font-style="italic">(open)</text>
      <text y="44" font-size="10" fill="#5E554A">spare · rotate</text>
    </g>
    <g transform="translate(300,40)">
      <text font-size="10" letter-spacing="2" fill="#8E7A54">CELL 6</text>
      <text y="24" font-size="18" font-weight="600" fill="#1C1A17">Churros</text>
      <text y="44" font-size="10" fill="#5E554A">dessert · boxed</text>
    </g>
  </g>

  <!-- key rules -->
  <g transform="translate(60,540)" font-size="10" fill="#5E554A">
    <rect x="0" y="-12" width="14" height="12" fill="#DFE4EA" stroke="#1C1A17"/>
    <text x="20" y="-2">freezer ≤ 0°F · log 2×/day · any thaw = discard</text>
  </g>
</svg>
