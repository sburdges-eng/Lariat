<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Lariat — BEO Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,500;10..72,700;10..72,800&family=Libre+Franklin:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --paper:#F4EFE3; --card:#FFFDF7; --ink:#241F19; --mut:#6D6355; --rule:#D8CFBC;
  --red:#8A2B1D; --blue:#3E5A6B; --ok:#4C6B45; --amber:#B07C24; --amber-bg:#F6EBD2;
  --disp:'Big Shoulders','Arial Narrow',sans-serif; --body:'Libre Franklin','Segoe UI',sans-serif;
  --mono:'IBM Plex Mono','Consolas',monospace;
}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.45}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink)}
:focus-visible{outline:3px solid var(--blue);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}

.brand{background:var(--ink);color:var(--paper);padding:14px 20px 10px;border-bottom:5px solid var(--red)}
.brand .rope{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand h1{font-family:var(--disp);font-weight:800;font-size:30px;letter-spacing:.14em;text-transform:uppercase}
.brand .sub{font-family:var(--disp);font-weight:500;letter-spacing:.3em;font-size:12px;text-transform:uppercase;color:#CDB79A}
.toolbar{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.tbtn{font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;background:transparent;color:var(--paper);
  border:1.5px solid #CDB79A;padding:6px 12px;border-radius:3px}
.tbtn:hover{background:var(--red);border-color:var(--red)}
.evline{margin-top:8px;display:flex;gap:6px 22px;flex-wrap:wrap;font-size:13.5px}
.evline .m{font-family:var(--mono);font-size:12.5px;color:#E8DFC9}

.rail{display:flex;gap:8px;align-items:flex-end;padding:14px 20px 0;border-bottom:2px solid var(--ink);
  background:var(--paper);position:sticky;top:0;z-index:5;overflow-x:auto}
.stub{position:relative;font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:15px;
  background:var(--card);border:2px solid var(--ink);border-bottom:none;padding:9px 18px 11px 28px;border-radius:6px 6px 0 0;color:var(--mut);white-space:nowrap}
.stub::before{content:"";position:absolute;left:11px;top:50%;width:8px;height:8px;border-radius:50%;
  transform:translateY(-50%);background:var(--paper);box-shadow:inset 0 0 0 1.5px var(--ink)}
.stub[aria-selected="true"]{color:var(--ink);background:var(--paper);padding-bottom:13px;margin-bottom:-2px}
.stub[aria-selected="true"]::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:3px;background:var(--paper)}
.stub .who{display:block;font-family:var(--body);font-weight:500;font-size:10px;letter-spacing:.05em;text-transform:none;color:var(--mut)}

main{max-width:1220px;margin:0 auto;padding:20px}
.view{display:none}.view.on{display:block}
.grid{display:grid;grid-template-columns:1.35fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
@media(max-width:940px){.grid{grid-template-columns:1fr}.brand h1{font-size:24px}}
.card{background:var(--card);border:1.5px solid var(--ink);border-radius:4px;padding:15px 17px;margin-bottom:18px;box-shadow:3px 3px 0 rgba(36,31,25,.14)}
.card h2{font-family:var(--disp);font-weight:800;font-size:18px;letter-spacing:.1em;text-transform:uppercase;
  border-bottom:2px solid var(--ink);padding-bottom:6px;margin-bottom:12px;display:flex;align-items:baseline;gap:10px}
.card h2 .tag{font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.12em;color:var(--card);background:var(--blue);padding:2px 8px;border-radius:2px;transform:translateY(-2px)}
.small{font-size:12.5px;color:var(--mut)} .mono{font-family:var(--mono)}

/* forms */
.f{display:grid;gap:4px;margin-bottom:10px}
.f label{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut)}
.f input,.f select,.f textarea{background:#FFFEF9;border:1.5px solid var(--ink);border-radius:3px;padding:7px 9px;font-size:14px}
.f input.mono, .qty, .price, .money{font-family:var(--mono)}
.frow{display:grid;gap:10px}.frow.c2{grid-template-columns:1fr 1fr}.frow.c3{grid-template-columns:1fr 1fr 1fr}
.frow.c4{grid-template-columns:1.4fr .6fr .8fr .8fr}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-family:var(--disp);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:11.5px;text-align:left;border-bottom:2px solid var(--ink);padding:6px 6px 5px}
td{padding:5px 6px;border-bottom:1px solid var(--rule);vertical-align:middle}
tr:last-child td{border-bottom:none}
td.n,th.n{text-align:right;font-family:var(--mono);font-size:13px;white-space:nowrap}
.totrow td{border-top:2px solid var(--ink);border-bottom:none;font-weight:700}
td input{width:100%;background:#FFFEF9;border:1.2px solid var(--rule);border-radius:2px;padding:5px 7px;font-size:13.5px}
td input.qty,td input.price{text-align:right;font-family:var(--mono)}
td input:focus{border-color:var(--ink)}
.x{background:none;border:none;color:var(--red);font-weight:700;font-size:15px;padding:2px 6px}
.addbtn{font-family:var(--mono);font-size:12px;letter-spacing:.06em;background:var(--ink);color:var(--paper);border:none;border-radius:3px;padding:7px 14px;margin-top:8px}
.addbtn:hover{background:var(--red)}
.badge{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;padding:1.5px 7px;border-radius:2px;border:1.2px solid currentColor;margin:1px 3px 1px 0;white-space:nowrap}
.b-need{color:#fff;background:var(--red);border-color:var(--red)} .b-ok{color:var(--ok)} .b-warn{color:var(--amber)} .b-bar{color:var(--blue)}

/* summary strip on EVENT tab */
.strip{position:sticky;bottom:0;background:var(--ink);color:var(--paper);border-top:4px solid var(--red);
  display:flex;gap:8px 26px;flex-wrap:wrap;align-items:center;padding:10px 20px;font-family:var(--mono);font-size:13px;z-index:4}
.strip b{font-family:var(--disp);font-weight:800;font-size:20px;letter-spacing:.04em}
.strip .ok{color:#9DC08B}.strip .warn{color:#E5B567}

/* host/kitchen/mgmt visual pieces (shared with dashboard) */
.soe{list-style:none}.soe li{display:grid;grid-template-columns:86px 1fr;gap:12px;padding:8px 0;border-bottom:1px dashed var(--rule)}
.soe li:last-child{border-bottom:none}.soe time{font-family:var(--mono);font-weight:600;font-size:13.5px;color:var(--red)}
.meter{height:16px;border:1.5px solid var(--ink);border-radius:2px;background:repeating-linear-gradient(45deg,#EDE6D4 0 6px,#E4DCC7 6px 12px);position:relative;margin:8px 0 4px}
.meter .fill{position:absolute;inset:0;width:0%;background:var(--ok)} .meter.under .fill{background:var(--amber)}
.meter .pin{position:absolute;top:-5px;bottom:-5px;width:2.5px;background:var(--ink)}
.chit{background:#FFFEF9;border:1.5px solid var(--ink);border-radius:3px;position:relative;font-family:var(--mono);padding:14px 16px 16px;box-shadow:3px 3px 0 rgba(36,31,25,.14)}
.chit::before{content:"";position:absolute;top:-7px;left:8px;right:8px;height:12px;background:radial-gradient(circle at 6px 0px, transparent 5.5px, #FFFEF9 6px);background-size:16px 12px;background-repeat:repeat-x}
.chit h3{font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:.16em;text-align:center;border-bottom:1.5px dashed var(--ink);padding-bottom:8px;margin-bottom:8px}
.chit .row{display:grid;grid-template-columns:74px 66px 1fr;gap:10px;padding:6px 0;border-bottom:1px dotted var(--rule);font-size:13px}
.chit .row:last-child{border-bottom:none}
.chit .t{font-weight:600;color:var(--red)} .chit .st{font-size:10.5px;background:var(--ink);color:var(--paper);border-radius:2px;padding:1px 5px;text-align:center;height:fit-content}
.chit .it{color:var(--mut);font-size:12px}
.day{border:1.5px solid var(--ink);border-left:6px solid var(--blue);border-radius:3px;background:var(--card);margin-bottom:12px;padding:10px 14px}
.day h3{font-family:var(--disp);font-weight:800;font-size:16px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.day label{display:flex;gap:10px;align-items:flex-start;padding:5px 0;border-bottom:1px dashed var(--rule);font-size:13.5px}
.day label:last-child{border-bottom:none}
.day input{width:16px;height:16px;margin-top:2px;accent-color:var(--red)}
.day label.done{color:var(--mut);text-decoration:line-through}
.day .it{font-weight:600} .day.today{border-left-color:var(--red)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1.5px solid var(--ink);border-radius:4px;padding:12px 14px;box-shadow:3px 3px 0 rgba(36,31,25,.14)}
.kpi .v{font-family:var(--disp);font-weight:800;font-size:27px}
.kpi .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-top:2px}
.kpi.hero{background:var(--ink);color:var(--paper)} .kpi.hero .l{color:#CDB79A} .kpi.flag .v{color:var(--amber)}
.wf .wrow{display:grid;grid-template-columns:170px 1fr 100px;gap:10px;align-items:center;padding:5px 0}
.wf .bar{height:15px;border:1.2px solid var(--ink);border-radius:2px;background:var(--card);overflow:hidden}
.wf .bar i{display:block;height:100%}
.wf .amt{font-family:var(--mono);font-size:12.5px;text-align:right}
.gauge{height:14px;border:1.5px solid var(--ink);border-radius:2px;background:#EDE6D4;position:relative;margin:6px 0 2px}
.gauge .fill{position:absolute;inset:0;width:0%;background:var(--ok)} .gauge .pin{position:absolute;top:-5px;bottom:-5px;width:2.5px;background:var(--ink)}
.flagcard{background:var(--amber-bg);border:1.5px solid var(--amber);border-radius:3px;padding:8px 12px;margin-bottom:8px;font-size:13.5px}
.disc{font-size:11.5px;color:var(--mut);border-top:1px dashed var(--rule);margin-top:10px;padding-top:8px;font-style:italic}
.footer{margin:8px 0 60px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--mut)}

/* library */
.libgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.libcard{background:var(--card);border:1.5px solid var(--ink);border-radius:4px;padding:14px 16px;box-shadow:3px 3px 0 rgba(36,31,25,.14);position:relative}
.libcard.active{border-color:var(--red);box-shadow:3px 3px 0 var(--red)}
.libtop{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.libbadge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;padding:2px 7px;border-radius:2px;text-transform:uppercase;white-space:nowrap}
.libbadge.b-urgent{background:var(--red);color:#fff}
.libbadge.b-soon{background:transparent;color:var(--mut);border:1px solid var(--rule)}
.libbadge.b-past{background:transparent;color:var(--mut);border:1px solid var(--rule)}
.libcard h3{font-family:var(--disp);font-weight:800;font-size:19px;letter-spacing:.02em;margin-bottom:2px}
.libcard .d{font-family:var(--mono);font-size:12px;color:var(--mut);margin-bottom:8px}
.libcard .stat{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;border-top:1px dashed var(--rule)}
.libcard .btns{display:flex;gap:6px;margin-top:10px}
.libcard button{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.05em;padding:6px 8px;border-radius:3px;border:1.5px solid var(--ink);background:var(--paper)}
.libcard button.open{background:var(--ink);color:var(--paper)}
.libcard button.danger{color:var(--red);border-color:var(--red)}
.libnew{border:2px dashed var(--rule);border-radius:4px;display:flex;align-items:center;justify-content:center;min-height:150px;
  font-family:var(--disp);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);background:transparent}
.libnew:hover{border-color:var(--ink);color:var(--ink)}

/* season */
.sday{border:1px solid var(--rule);border-radius:4px;padding:8px 10px;margin-bottom:8px}
.sday.today{border-color:var(--red);border-width:1.5px}
.sday.overdue{background:var(--needbg,#FFF6DE)}
.sdayhead{font-family:var(--disp);font-weight:800;letter-spacing:.03em;margin-bottom:4px}
.prow{padding:2px 0;font-size:13px}
.prow .pcl{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);margin-right:4px}
.badge.b-warn{background:var(--amber);color:#fff}

@media print{
  body{background:#fff;font-size:12px}
  .rail,.toolbar,.strip,.addbtn,.x{display:none!important}
  .brand{background:#fff;color:#000;border-bottom:3px solid #000;padding:0 0 8px}
  .brand .sub{color:#000} .evline .m{color:#000}
  main{padding:8px 0;max-width:none}
  .card,.kpi,.chit,.day{box-shadow:none;break-inside:avoid}
  .kpi.hero{background:#fff;color:#000}
  .view{display:none} .view.on{display:block}
  td input{border:none;padding:0;background:none}
}
</style>
</head>
<body>
<header class="brand">
  <div class="rope">
    <h1>The Lariat</h1><span class="sub">BEO Studio</span>
    <div class="toolbar">
      <button class="tbtn" id="btnLibrary">LIBRARY</button>
      <button class="tbtn" id="btnNew">NEW EVENT</button>
      <button class="tbtn" id="btnImport">IMPORT</button>
      <button class="tbtn" id="btnExport">EXPORT</button>
      <button class="tbtn" onclick="window.print()">PRINT VIEW</button>
      <input type="file" id="fileImport" accept="application/json" hidden>
    </div>
  </div>
  <div class="evline" id="evline"></div>
</header>

<nav class="rail" role="tablist" aria-label="Views">
  <button class="stub" role="tab" id="tab-library" aria-selected="false" data-v="library">Library<span class="who">all events</span></button>
  <button class="stub" role="tab" id="tab-season" aria-selected="false" data-v="season">Season<span class="who">one kitchen</span></button>
  <button class="stub" role="tab" id="tab-event" aria-selected="true" data-v="event">Event<span class="who">build &amp; edit</span></button>
  <button class="stub" role="tab" id="tab-host" aria-selected="false" data-v="host">Host<span class="who">banquet host / floor</span></button>
  <button class="stub" role="tab" id="tab-kitchen" aria-selected="false" data-v="kitchen">Kitchen<span class="who">head chef / BOH</span></button>
  <button class="stub" role="tab" id="tab-mgmt" aria-selected="false" data-v="mgmt">Management<span class="who">money &amp; margin</span></button>
  <button class="stub" role="tab" id="tab-settings" aria-selected="false" data-v="settings">Settings<span class="who">rates · menu · rules</span></button>
</nav>

<main>
  <section class="view" id="view-library" role="tabpanel"></section>
  <section class="view" id="view-season" role="tabpanel"></section>
  <section class="view on" id="view-event" role="tabpanel"></section>
  <section class="view" id="view-host" role="tabpanel"></section>
  <section class="view" id="view-kitchen" role="tabpanel"></section>
  <section class="view" id="view-mgmt" role="tabpanel"></section>
  <section class="view" id="view-settings" role="tabpanel"></section>
</main>
<div class="strip" id="strip"></div>
<div class="footer">THE LARIAT · 206 E MAIN ST, BUENA VISTA CO · BEO STUDIO — EVERYTHING DRAFT UNTIL VERIFIED</div>

  row("Food revenue",iv.foodRev,fs); row("Bar revenue",iv.barRev,bs);
  row("Food COGS",m.food_cogs,fcC); row("Bar COGS",m.bar_cogs,bcC);
  row("FOH hours",s.foh_hours,ah,false); row("BOH hours",s.boh_hours,bh,false);
  row("Labor $",s.labor_cost,al);
  if(fs&&fcC!=null){ const real=fcC/fs;
    learn.push("Real food cost "+(real*100).toFixed(1)+"% vs the "+((m.fc||0)*100).toFixed(0)+"% assumption — "+
      (real<(m.fc||0)?"model runs high (conservative).":"model runs low, margin is optimistic.")); }
  if(bs&&bcC!=null){ learn.push("Real bar cost "+((bcC/bs)*100).toFixed(1)+"% vs the "+((m.bc||0)*100).toFixed(0)+"% assumption."); }
  if(bh!=null&&s.boh_hours){ learn.push("BOH hours actual "+bh+" vs planned "+Math.round(s.boh_hours)+" — "+
      (bh<s.boh_hours?"prep model over-plans.":"prep model under-plans.")); }
  if(ah!=null&&s.foh_hours){ learn.push("FOH hours actual "+ah+" vs planned "+Math.round(s.foh_hours)+" — tune guests-per-server if it repeats."); }
  const heads=+S.ev.headcount||0;
  if(heads&&(ah!=null||bh!=null)){ learn.push("Actual labor hours per cover: "+(((ah||0)+(bh||0))/heads).toFixed(2)+
      (s.lhpc?" (planned "+s.lhpc.toFixed(2)+").":".")); }
  let am=null;
  if(fs!=null||bs!=null){ const rev=(fs||0)+(bs||0), fee=rev*(cfgFee()), cost=(fcC||0)+(bcC||0)+(al!=null?al:(s.labor_cost||0));
    am={collected:rev+fee, margin:rev+fee-cost, margin_pct:(rev+fee)?(rev+fee-cost)/(rev+fee):null};
    row("EVENT MARGIN $",m.margin,am.margin); }
  return {rows,learnings:learn,actual_margin:am,notes:a.notes||""};
}
function cfgFee(){ try{ return +S.cfg.money.fee||0.20; }catch(e){ return 0.20; } }
function computeAll(S,cfg){
  const inv=computeInvoice(S,cfg);
  const staff=computeStaff(S,cfg,inv);
  const margin=computeMargin(S,cfg,inv,staff);
  const flags=[];
  inv.lines.forEach(l=>{ if(l.unpriced) flags.push("Unpriced line: "+l.item); });
  computeMatrix(S).forEach(m=>{ if(/^need/i.test(m.status)) flags.push("Allergen data missing: "+m.item); });
  S.fees.concat(S.av).forEach(e=>{ if(e.notes) flags.push((e.item||"Fee")+": "+e.notes); });
  if(S.bar.mode==="fill" && !(+S.ev.minimum)) flags.push("Bar is set to fill-to-minimum but no minimum spend is set.");
  if(margin && margin.margin_pct!=null && margin.margin_pct<0.40) flags.push("Event margin under 40% — check the minimum, the menu mix, or the labor plan.");
  if(staff && staff.service_fee_est!=null && staff.foh_cost>staff.service_fee_est) flags.push("FOH comp exceeds the 20% service fee — tips fill the gap.");
  return {inv,staff,margin,flags,countdown:computeCountdown(S),fire:computeFire(S),
          matrix:computeMatrix(S),purchase:computePurchase(S),actuals:computeActuals(S,margin,staff,inv)};
}

const OLDKEY="lariatBeoStudio.v1", KEY="lariatBeoStudio.v2";
function blankEvent(){ return {ev:{client:"",date:"",headcount:"",start:"",service:"",space:"",minimum:"",style:"",hours:""},
  lines:[], bar:{mode:"fill",amount:"",notes:""}, av:[], fees:[], soe:[], checks:{}, actuals:{}, savedAt:0}; }
function blankState(){ return Object.assign(blankEvent(),
  {cfg:{money:JSON.parse(JSON.stringify(DATA.money_cfg)), staff:JSON.parse(JSON.stringify(DATA.staff_cfg))},
   prices:JSON.parse(JSON.stringify(DATA.prices))}); }
function eventFromSpec(sp){ if(!sp) return null; const S=blankEvent(); const e=sp.event||{};
  S.ev={client:e.client_name||"",date:e.event_date||"",headcount:e.headcount||"",start:e.start_time||"",
    service:e.service_time||"",space:e.space||"",minimum:e.minimum_spend||"",style:e.service_style||"",hours:e.service_hours||""};
  S.lines=(sp.line_items||[]).map(l=>({item:l.item||"",qty:l.amount||"",price:l.cost||"",auto:false}));
  const b=sp.bar||{}; S.bar={mode:b.mode==="fill_minimum"?"fill":"fixed",amount:b.amount||"",notes:b.notes||""};
  S.av=(sp.av||[]).map(e=>({item:e.item||"",charge:e.charge||"",cost:e.cost||"",notes:e.notes||""}));
  S.fees=(sp.additional_fees||[]).map(e=>({item:e.item||"",charge:e.charge||"",cost:e.cost||"",notes:e.notes||""}));
  S.soe=(sp.series_of_events||[]).map(x=>({time:x.time||"",what:x.what||""}));
  return S; }
function newId(){ return "e"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
const EVENT_KEYS=["ev","lines","bar","av","fees","soe","checks","actuals","savedAt"];
function eventPart(state){ const o={}; EVENT_KEYS.forEach(k=>o[k]=state[k]); return o; }

function loadWorkspace(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
    const old=localStorage.getItem(OLDKEY);           // migrate a single-event v1 save
    if(old){ const o=JSON.parse(old);
      const id=newId(); const ev=Object.assign(blankEvent(), eventPart(o), {savedAt:Date.now()});
      return {activeId:id, events:{[id]:ev},
        cfg:o.cfg||blankState().cfg, prices:o.prices||blankState().prices}; }
  }catch(e){}
  return null;
}
function saveWorkspace(){
  try{
    WS.events[WS.activeId]=Object.assign(eventPart(S),{savedAt:Date.now()});
    WS.cfg=S.cfg; WS.prices=S.prices;
    localStorage.setItem(KEY, JSON.stringify(WS));
  }catch(e){}
}
function store(){ saveWorkspace(); }
function makeS(){ return Object.assign({}, WS.events[WS.activeId], {cfg:WS.cfg, prices:WS.prices}); }

let WS = loadWorkspace();
if(!WS){
  const seeds=(DATA.default_events&&DATA.default_events.length)? DATA.default_events : [];
  const events={}; let firstId=null;
  seeds.forEach((sp,i)=>{ const ev=eventFromSpec(sp); if(!ev) return;
    const id=newId()+"_"+i; events[id]=Object.assign(ev,{savedAt:Date.now()-i});
    if(!firstId) firstId=id; });
  if(!firstId){ firstId=newId(); events[firstId]=blankEvent(); }
  WS = {activeId:firstId, events,
        cfg:blankState().cfg, prices:blankState().prices};
}
if(!WS.events[WS.activeId]) WS.activeId = Object.keys(WS.events)[0] || (()=>{const id=newId(); WS.events[id]=blankEvent(); return id;})();
let S = makeS();

function openEvent(id){ if(!WS.events[id]) return; store(); WS.activeId=id; S=makeS(); saveWorkspace(); show("event"); }
function newEvent(){ store(); const id=newId(); WS.events[id]=blankEvent(); WS.activeId=id; S=makeS(); saveWorkspace(); show("event"); }
function duplicateEvent(id){ store(); const src=WS.events[id]; if(!src) return;
  const copy=JSON.parse(JSON.stringify(src)); copy.ev.client=(copy.ev.client||"Untitled")+" (copy)"; copy.savedAt=Date.now();
  const nid=newId(); WS.events[nid]=copy; WS.activeId=nid; S=makeS(); saveWorkspace(); show("event"); }
function deleteEvent(id){ if(!confirm("Delete this event? This can't be undone.")) return;
  delete WS.events[id];
  if(Object.keys(WS.events).length===0){ const nid=newId(); WS.events[nid]=blankEvent(); WS.activeId=nid; }
  else if(WS.activeId===id){ WS.activeId=Object.keys(WS.events).sort((a,b)=>WS.events[b].savedAt-WS.events[a].savedAt)[0]; }
  S=makeS(); saveWorkspace(); show(activeView==="library"?"library":"event"); }
function findMatchingEvent(ev){
  const target=norm(ev&&ev.client||"")+"|"+((ev&&ev.date)||"");
  if(target==="|") return null;
  for(const id of Object.keys(WS.events)){
    const e=WS.events[id].ev;
    if(norm(e.client||"")+"|"+(e.date||"")===target) return id;
  }
  return null;
}
function importAsNewEvent(spec){
  const ev=Object.assign(blankEvent(), eventPart(spec), {savedAt:Date.now()});
  const matchId=findMatchingEvent(spec.ev||{});
  if(matchId){
    const nm=(spec.ev&&spec.ev.client)||"this client", dt=(spec.ev&&spec.ev.date)||"that date";
    const overwrite=confirm('An event for "'+nm+'" on '+dt+' already exists in your library.\n\n'+
      'OK — overwrite it with this import.\nCancel — import as a new, separate event.');
    if(overwrite){ store(); WS.events[matchId]=ev; WS.activeId=matchId; S=makeS(); saveWorkspace(); return; }
  }
  store(); const id=newId(); WS.events[id]=ev; WS.activeId=id; S=makeS(); saveWorkspace();
}

      act.rows.map(r=>{

function wireActuals(){

}

/* ---------------- SEASON (cross-event) ---------------- */
function seasonData(){
  const ids=Object.keys(WS.events).filter(id=>(WS.events[id].ev||{}).date)
    .sort((a,b)=>String(WS.events[a].ev.date).localeCompare(String(WS.events[b].ev.date)));
  const evRows=[], dayMap={}, prodMap={};
  let booked=0, marginSum=0, collectedSum=0, covers=0, under=0, unbuilt=0;
  ids.forEach(id=>{
    const st=WS.events[id];
    const flat=Object.assign({},st,{cfg:WS.cfg,prices:WS.prices});
    const R=computeAll(flat,WS.cfg);
    booked+=R.inv.subtotal||0; covers+=(+st.ev.headcount||0);
    if(!(st.lines||[]).length) unbuilt++;
    if(R.margin){ marginSum+=R.margin.margin||0; collectedSum+=R.margin.collected||0;
      if(R.margin.margin_pct!=null && R.margin.margin_pct<0.40 && (st.lines||[]).length) under++; }
    evRows.push({id,st,R});
    (R.countdown||[]).forEach(day=>{
      const rec=dayMap[day.date]=dayMap[day.date]||{label:day.label,date:day.date,rows:[]};
      day.tasks.forEach(t=>{ const key=day.label+"|"+t.item+"|"+t.task;
        rec.rows.push({id,client:st.ev.client||"Untitled",item:t.item,task:t.task,key,
                       done:!!((st.checks||{})[key])}); });
    });
    (R.purchase||[]).forEach(p=>{ if(!p.product||p.product==="—") return;
      (prodMap[p.product]=prodMap[p.product]||{clients:new Set(),detail:p.detail||""})
        .clients.add(st.ev.client||"Untitled"); });
  });
  return {evRows,dayMap,prodMap,kpi:{booked,marginSum,collectedSum,covers,under,unbuilt,n:ids.length}};
}
function buildSeasonICS(dayMap){
  const stamp=new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const escape=t=>String(t).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//The Lariat//BEO Studio//EN"];
  Object.keys(dayMap).sort().forEach(date=>{
    const byClient={};
    dayMap[date].rows.forEach(r=>{ (byClient[r.client]=byClient[r.client]||[]).push(r.item+": "+r.task); });
    for(const [client,tasks] of Object.entries(byClient)){
      const d=date.replace(/-/g,"");
      lines.push("BEGIN:VEVENT",
        "UID:"+d+"-"+client.replace(/[^a-z0-9]/gi,"")+"@lariat-beo",
        "DTSTAMP:"+stamp,
        "DTSTART;VALUE=DATE:"+d,
        "SUMMARY:"+escape("PREP — "+client),
        "DESCRIPTION:"+escape(tasks.join("\n")),
        "END:VEVENT");
    }
  });
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}
function renderSeason(){
  const {evRows,dayMap,prodMap,kpi}=seasonData();
  if(!kpi.n){ el("view-season").innerHTML="<div class='card'><h2>Season</h2><div class='small'>No dated events in the library yet.</div></div>"; return; }
  const todayISO=toISOLocal(new Date());
  const wPct=kpi.collectedSum? kpi.marginSum/kpi.collectedSum : null;

  const evTable=evRows.map(({id,st,R})=>{
    const built=(st.lines||[]).length>0;
    const mp=R.margin?R.margin.margin_pct:null;
    return `<tr><td>${esc(st.ev.date||"")}</td><td><a href="#" data-sopen="${id}">${esc(st.ev.client||"Untitled")}</a></td>
      <td class="n">${esc(st.ev.headcount||"—")}</td>
      <td class="n">${built?$$m(R.inv.subtotal):"<span class='small'>no menu yet</span>"}</td>
      <td class="n" style="${mp!=null&&mp<0.40?"color:var(--amber)":""}">${built&&mp!=null?pct(mp):"—"}</td></tr>`;
  }).join("");

  const dayKeys=Object.keys(dayMap).sort();
  const prep=dayKeys.map(date=>{
    const rec=dayMap[date];
    const clients=[...new Set(rec.rows.map(r=>r.client))];
    const overdue=date<todayISO&&rec.rows.some(r=>!r.done);
    const isToday=date===todayISO;
    const rows=rec.rows.map(r=>
      `<div class="prow"><label><input type="checkbox" data-sid="${r.id}" data-skey="${esc(r.key)}" ${r.done?"checked":""}>
       <span class="pcl">${esc(r.client)}</span> ${esc(r.item)} — ${esc(r.task)}</label></div>`).join("");
    return `<div class="sday ${overdue?"overdue":""} ${isToday?"today":""}">
      <div class="sdayhead">${esc(rec.label)}${isToday?' <span class="badge b-need">TODAY</span>':""}${overdue?' <span class="badge b-need">OVERDUE</span>':""}
        ${clients.length>1?` <span class="badge b-warn">⚑ ${clients.length} EVENTS — check cooler/oven space</span>`:""}</div>${rows}</div>`;
  }).join("");

  const shared=Object.entries(prodMap).filter(([,v])=>v.clients.size>1)
    .sort((a,b)=>b[1].clients.size-a[1].clients.size);
  const sharedRows=shared.slice(0,14).map(([prod,v])=>
    `<tr><td>${esc(prod)}<div class="small">${esc(v.detail)}</div></td><td class="n">${v.clients.size}</td><td>${esc([...v.clients].join(", "))}</td></tr>`).join("");

  el("view-season").innerHTML=`
  <div class="kpis">
    <div class="kpi hero"><div class="v">${$$m(kpi.booked)}</div><div class="l">Booked (subtotals)</div></div>
    <div class="kpi"><div class="v">${$$m(kpi.marginSum)}</div><div class="l">Est. margin $</div></div>
    <div class="kpi ${kpi.under?"flag":""}"><div class="v">${wPct!=null?pct(wPct):"—"}</div><div class="l">Blended margin%${kpi.under?" · "+kpi.under+" under 40%":""}</div></div>
    <div class="kpi"><div class="v">${kpi.n}</div><div class="l">Events · ${kpi.covers} covers</div></div>
  </div>
  ${kpi.unbuilt?`<div class="flagcard">⚑ ${kpi.unbuilt} event(s) have no menu yet — booked $ and margin only count what's built.</div>`:""}
  <div class="grid"><div>
    <div class="card"><h2>The Season <span class="tag">${kpi.n} EVENTS</span></h2>
      <table><thead><tr><th>Date</th><th>Client</th><th class="n">Covers</th><th class="n">Subtotal</th><th class="n">Margin</th></tr></thead><tbody>${evTable}</tbody></table></div>
    <div class="card"><h2>Order Once <span class="tag">SHARED PRODUCT</span></h2>
      ${shared.length?`<table><thead><tr><th>Product</th><th class="n">Events</th><th>Used by</th></tr></thead><tbody>${sharedRows}</tbody></table>
      <div class="small" style="margin-top:8px">Products multiple events need — consolidate into single case orders instead of split buys.</div>`
      :'<div class="small">No product overlaps between built events yet.</div>'}</div>
  </div><div>
    <div class="card"><h2>Merged Prep Calendar <span class="tag">ALL EVENTS</span></h2>
      <div class="small" style="margin-bottom:8px">Every event's countdown on one calendar. Checking a box here checks it on that event's Kitchen view too.</div>
      ${prep||'<div class="small">No prep scheduled — build menus on the Event tab.</div>'}
      ${dayKeys.length?`<button class="tbtn" id="icsBtn" style="margin-top:10px">⤓ EXPORT PREP DAYS (.ics)</button>
      <div class="small" style="margin-top:6px">Drops into Google Calendar — one all-day "PREP — client" entry per prep day.</div>`:""}</div>
  </div></div>`;

  el("view-season").querySelectorAll("[data-sopen]").forEach(a=>a.onclick=e=>{e.preventDefault(); openEvent(a.dataset.sopen);});
  el("view-season").querySelectorAll("[data-sid]").forEach(cb=>cb.addEventListener("change",()=>{
    const ev=WS.events[cb.dataset.sid]; if(!ev) return;
    ev.checks=ev.checks||{};
    if(cb.checked) ev.checks[cb.dataset.skey]=true; else delete ev.checks[cb.dataset.skey];
    if(cb.dataset.sid===WS.activeId) S.checks=ev.checks;
    saveWorkspace(); renderSeason();
  }));
  const ib=el("icsBtn");
  if(ib) ib.onclick=()=>{ const ics=buildSeasonICS(dayMap);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));
    a.download="lariat-prep-days.ics"; a.click(); URL.revokeObjectURL(a.href); };
}

/* ---------------- LIBRARY ---------------- */
function renderLibrary(){
  const ids=Object.keys(WS.events).sort((a,b)=>(WS.events[b].savedAt||0)-(WS.events[a].savedAt||0));
  const cards=ids.map(id=>{
    const st=WS.events[id], e=st.ev||{};
    const flatS=Object.assign({},st,{cfg:WS.cfg,prices:WS.prices});
    const R=computeAll(flatS,WS.cfg);
    const margin=R.margin, minOk=R.inv.minimum? R.inv.over>=0 : null;
    const du=daysUntil(e.date);
    let badge="";
    if(du!==null){
      const todayISO=toISOLocal(new Date());
      let prepDue=false;
      if(R.countdown){
        for(const day of R.countdown){
          if(day.date && day.date<=todayISO){
            for(const t of day.tasks){
              if(!(st.checks||{})[day.label+"|"+t.item+"|"+t.task]){ prepDue=true; break; } }
          }
          if(prepDue) break;
        }
      }
      if(du<0) badge='<span class="libbadge b-past">PAST EVENT</span>';
      else if(du===0) badge='<span class="libbadge b-urgent">TODAY</span>';
      else if(prepDue) badge='<span class="libbadge b-urgent">PREP DUE</span>';
      else if(du<=3) badge='<span class="libbadge b-urgent">'+du+" DAY"+(du===1?"":"S")+' OUT</span>';
      else badge='<span class="libbadge b-soon">'+du+' days out</span>';
    }
    return `<div class="libcard ${id===WS.activeId?"active":""}">
      <div class="libtop"><h3>${esc(e.client||"Untitled event")}</h3>${badge}</div>
      <div class="d">${esc(weekdayName(e.date)||"no date")} ${esc(e.date||"")} · ${esc(e.headcount||"—")} covers</div>
      <div class="stat"><span>Subtotal</span><span class="mono">${$$m(R.inv.subtotal)}</span></div>
      <div class="stat"><span>Minimum</span><span class="mono">${R.inv.minimum? (minOk?"<span style='color:var(--ok)'>met</span>":"<span style='color:var(--amber)'>under</span>") : "—"}</span></div>
      <div class="stat"><span>Margin</span><span class="mono">${margin? pct(margin.margin_pct):"—"}</span></div>
      <div class="btns">
        <button class="open" data-open="${id}">OPEN</button>
        <button data-dup="${id}">DUPLICATE</button>
        <button class="danger" data-delx="${id}">DELETE</button>
      </div></div>`;
  }).join("");
  el("view-library").innerHTML = `<div class="card" style="margin-bottom:14px"><h2>Event Library <span class="tag">${ids.length} SAVED</span></h2>
    <div class="small">Every event you build stays here — open one to keep editing, duplicate to reuse a menu, or delete when it's done. Settings and menu prices are shared across all events.</div></div>
    <div class="libgrid">${cards}<button class="libnew" id="libNew">+ New Event</button></div>`;
  el("libNew").onclick=newEvent;
  el("view-library").querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openEvent(b.dataset.open));
  el("view-library").querySelectorAll("[data-dup]").forEach(b=>b.onclick=()=>duplicateEvent(b.dataset.dup));
  el("view-library").querySelectorAll("[data-delx]").forEach(b=>b.onclick=()=>deleteEvent(b.dataset.delx));
}


/* ---------------- boot, tabs, toolbar ---------------- */
function buildDatalist(){ el("menuItems").innerHTML=Object.keys(S.prices).sort().map(k=>'<option value="'+esc(k)+'">').join(""); }
const renderers={library:renderLibrary,season:renderSeason,event:renderEvent,host:renderHost,kitchen:renderKitchen,mgmt:renderMgmt,settings:renderSettings};
function show(v){ activeView=v;
  document.querySelectorAll(".stub").forEach(x=>x.setAttribute("aria-selected",x.dataset.v===v?"true":"false"));
  document.querySelectorAll(".view").forEach(x=>x.classList.toggle("on",x.id==="view-"+v));
  renderers[v](); renderEvline(); renderStrip(); window.scrollTo({top:0}); }
document.querySelectorAll(".stub").forEach(b=>b.addEventListener("click",()=>show(b.dataset.v)));
el("btnLibrary").onclick=()=>show("library");
el("btnNew").onclick=newEvent;
el("btnExport").onclick=()=>{ const name=("lariat-beo-"+(S.ev.client||"event")+"-"+(S.ev.date||"draft")).replace(/[^a-z0-9-]+/gi,"_")+".json";
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,1)],{type:"application/json"}));
  a.download=name; a.click(); URL.revokeObjectURL(a.href); };
el("btnImport").onclick=()=>el("fileImport").click();
el("fileImport").addEventListener("change",ev=>{ const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ try{ const j=JSON.parse(r.result);
    if(!j.ev||!j.lines) throw new Error("not a BEO Studio file");
    importAsNewEvent(j); show("event");
  }catch(e){ alert("Import failed: "+e.message); } }; r.readAsText(f); ev.target.value=""; });
buildDatalist();
(function(){
  const ids=Object.keys(WS.events);
  if(ids.length<=1){ show("event"); return; }
  let best=null, bestDu=Infinity;
  ids.forEach(id=>{ const du=daysUntil(WS.events[id].ev.date); if(du!==null && du>=0 && du<bestDu){bestDu=du; best=id;} });
  if(best!==null && bestDu<=3){ WS.activeId=best; S=makeS(); show("event"); }
  else show("library");
})();
</script>
</body>
