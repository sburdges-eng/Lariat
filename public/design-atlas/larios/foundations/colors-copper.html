<!-- @dsCard group="Colors" viewport="700x170" name="Copper — the books" subtitle="Burnished copper for recipe book, BEO worksheets, order guides" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--sans);padding:16px;color:var(--text);display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--radius);overflow:hidden;border:1px solid var(--hair)}
  .chip{height:52px}
  .meta{padding:8px 10px;background:var(--panel)}
  .n{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--text)}
  .h{font-family:var(--mono);font-size:9.5px;color:var(--text-muted)}
  .t{font-size:9.5px;color:var(--text-muted);display:block;margin-top:2px}
  .demo{flex:1.4;border-radius:var(--radius);border:1px solid #cabd9f;background:#f8f3e7;color:#17140f;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
  .demo .e{font-family:var(--mono);font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:#a8501a;font-weight:700}
  .demo .tt{font-family:var(--display);font-size:19px}
  .demo .tt em{font-style:normal;color:#a8501a}
  .demo .row{display:flex;justify-content:space-between;border-top:1px solid #cabd9f;padding-top:6px;font-size:11px;color:#6f6555}
  .demo .row b{font-family:var(--mono);color:#a8501a}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--copper)"></div><div class="meta"><span class="n">--copper</span><span class="h">#d97736</span><span class="t">fills · dark surfaces</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--copper-deep)"></div><div class="meta"><span class="n">--copper-deep</span><span class="h">#a8501a</span><span class="t">ink on paper</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--copper-wash)"></div><div class="meta"><span class="n">--copper-wash</span><span class="h">#e9c4b8</span><span class="t">selected row</span></div></div>
  <div class="demo">
    <span class="e">BEO · Nov 22</span>
    <span class="tt">Harvest <em>dinner</em></span>
    <div class="row"><span>Guaranteed covers</span><b>140</b></div>
  </div>
</body></html>
