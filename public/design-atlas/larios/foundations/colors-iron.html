<!-- @dsCard group="Colors" viewport="700x190" name="Iron — alternative dark" subtitle="Wrought-iron neutral charcoal + copper accent · replaces Ledger default & expo" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#0a0b0c;font-family:var(--sans);padding:14px;display:flex;gap:12px}
  .half{flex:1;border-radius:var(--radius);border:1px solid var(--hair);padding:14px;background:var(--bg);color:var(--text)}
  .m{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:10px}
  .sws{display:flex;gap:6px;margin-bottom:12px}
  .sw{flex:1;height:34px;border-radius:3px;border:1px solid var(--hair);position:relative}
  .sw i{position:absolute;bottom:2px;left:4px;font-style:normal;font-family:var(--mono);font-size:7.5px;color:var(--text-muted)}
  .demo{display:flex;gap:8px;align-items:center}
  .btnx{padding:5px 10px;border-radius:3px;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;background:var(--accent);color:var(--on-accent)}
  .pillx{padding:3px 8px;border-radius:99px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;border:1px solid var(--hair);color:var(--text-muted)}
  .t{font-family:var(--display);font-size:18px;margin-bottom:8px}
  .t em{font-style:normal;color:var(--accent)}
</style></head>
<body>
  <div class="half">
    <div class="m">Ledger · warm char (current default)</div>
    <div class="t">Dinner <em>service</em></div>
    <div class="sws">
      <span class="sw" style="background:var(--bg)"><i>bg</i></span>
      <span class="sw" style="background:var(--panel-2)"><i>panel</i></span>
      <span class="sw" style="background:var(--accent)"><i>amber</i></span>
      <span class="sw" style="background:var(--fire)"><i>fire</i></span>
    </div>
    <div class="demo"><span class="btnx">Save</span><span class="pillx">Ready</span></div>
  </div>
  <div class="half iron">
    <div class="m">Iron · neutral charcoal + copper</div>
    <div class="t">Dinner <em>service</em></div>
    <div class="sws">
      <span class="sw" style="background:var(--bg)"><i>bg</i></span>
      <span class="sw" style="background:var(--panel-2)"><i>panel</i></span>
      <span class="sw" style="background:var(--accent)"><i>copper</i></span>
      <span class="sw" style="background:var(--fire)"><i>crimson</i></span>
    </div>
    <div class="demo"><span class="btnx">Save</span><span class="pillx">Ready</span></div>
  </div>
</body></html>
