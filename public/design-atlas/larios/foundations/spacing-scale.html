<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="Compact density steps — 2 → 40px" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--mono);padding:20px;color:var(--text)}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:7px}
  .bar{height:14px;background:var(--accent);border-radius:2px}
  .n{font-size:10px;color:var(--text-muted);width:120px}
</style></head>
<body>
  <div class="row"><span class="n">--space-2 · 4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="n">--space-4 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="n">--space-6 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="n">--space-7 · 14</span><span class="bar" style="width:14px"></span></div>
  <div class="row"><span class="n">--space-8 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="n">--space-12 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="n">--space-16 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="n">--space-20 · 40</span><span class="bar" style="width:40px"></span></div>
</body></html>
