<!-- @dsCard group="Colors" viewport="700x150" name="Text & ink" subtitle="Parchment/bone text on warm char — primary and muted" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--sans);padding:22px;color:var(--text)}
  .stack{display:flex;flex-direction:column;gap:14px}
  .line{display:flex;align-items:baseline;gap:14px}
  .big{font-family:var(--display);font-size:26px}
  .n{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-left:auto}
</style></head>
<body>
  <div class="stack">
    <div class="line"><span class="big" style="color:var(--text)">Walk-in holding 38°. Line is ready.</span><span class="n">--text · #d4cbb5</span></div>
    <div class="line"><span class="big" style="color:var(--text-muted)">Counts logged at 4:30p.</span><span class="n">--text-muted · #b3a890</span></div>
    <div class="line"><span class="big" style="color:var(--accent)">Trout is 86'd.</span><span class="n">--accent · #e0922b</span></div>
  </div>
</body></html>
