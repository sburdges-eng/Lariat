<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--sans);padding:24px;color:var(--text)}
  .stack{display:flex;flex-direction:column;gap:20px}
  .stamp-row{display:flex;align-items:center;gap:8px;border-top:1px solid var(--hair);padding-top:12px}
  .stamp-row svg{width:15px;height:15px;color:var(--accent)}
</style></head>
<body>
  <div class="stack">
    <div class="eyebrow">Fri · Nov 14 · The Lariat</div>
    <div class="stamp-row">
      <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="20" cy="17" rx="11.5" ry="10"/><path d="M20 27 C 20 33, 23 36, 29 35.5"/><circle cx="20" cy="17" r="2.6" fill="currentColor" stroke="none"/></svg>
      <span class="stamp-label">Stations</span>
    </div>
  </div>
</body></html>
