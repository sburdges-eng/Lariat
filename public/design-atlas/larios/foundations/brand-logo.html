<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--sans);padding:24px;color:var(--text);display:flex;gap:36px;align-items:center;flex-wrap:wrap}
  .plate{background:var(--panel);border:1px solid var(--hair);border-radius:var(--radius);padding:22px 26px;display:flex;flex-direction:column;gap:12px;align-items:center}
  .plate img{display:block}
  .cap{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);font-weight:700}
  .wordmark-plate{background:#f8f3e7}
</style></head>
<body>
  <div class="plate wordmark-plate"><img src="../assets/logo-wordmark.jpg" alt="The Lariat 1885 wordmark" height="120"><span class="cap" style="color:#7a6e60">Wordmark · on cream</span></div>
  <div class="plate"><img src="../assets/app-icon.png" alt="Lariat app icon" width="104" height="104" style="border-radius:20px"><span class="cap">App mark</span></div>
</body></html>
