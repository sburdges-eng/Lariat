<!-- @dsCard group="Type" viewport="700x180" name="UI & body — Inter Tight" subtitle="Neutral sans for labels, controls, body copy" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--sans);padding:22px;color:var(--text)}
  .b{font-size:15px;line-height:1.55;max-width:520px;margin-bottom:16px}
  .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .weights{display:flex;gap:18px;align-items:baseline}
  .weights span{font-size:18px}
  .n{font-family:var(--mono);font-size:9px;color:var(--text-muted);display:block;text-transform:none;letter-spacing:0;font-weight:400}
</style></head>
<body>
  <div class="b">Running low on the brine. Pull more from the walk-in before rush — count what's left and log it so the next cook isn't caught out.</div>
  <div class="weights">
    <span style="font-weight:400">Regular<span class="n">400</span></span>
    <span style="font-weight:500">Medium<span class="n">500</span></span>
    <span style="font-weight:600">Semibold<span class="n">600</span></span>
    <span style="font-weight:700">Bold<span class="n">700</span></span>
    <span style="font-weight:800">Heavy<span class="n">800</span></span>
  </div>
</body></html>
