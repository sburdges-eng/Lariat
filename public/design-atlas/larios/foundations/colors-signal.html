<!-- @dsCard group="Colors" viewport="700x150" name="Signal palette" subtitle="The one warm accent + warm status: amber, oxblood, sage, brass, indigo" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--sans);padding:18px;color:var(--text)}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius);overflow:hidden;border:1px solid var(--hair)}
  .chip{height:56px}
  .meta{padding:8px 10px;background:var(--panel)}
  .n{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--text)}
  .h{font-family:var(--mono);font-size:9.5px;color:var(--text-muted)}
  .t{font-size:9.5px;color:var(--text-muted);display:block;margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><span class="n">--accent</span><span class="h">#e0922b</span><span class="t">gaslight amber</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--fire)"></div><div class="meta"><span class="n">--fire</span><span class="h">#e05a3c</span><span class="t">oxblood · 86</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--ok)"></div><div class="meta"><span class="n">--ok</span><span class="h">#7aa07f</span><span class="t">sage · ready</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--metal)"></div><div class="meta"><span class="n">--metal</span><span class="h">#c2912f</span><span class="t">brass · warn</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="meta"><span class="n">--info</span><span class="h">#6b90b4</span><span class="t">indigo · info</span></div></div>
  </div>
</body></html>
