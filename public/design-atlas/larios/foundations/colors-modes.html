<!-- @dsCard group="Colors" viewport="700x170" name="Surface modes" subtitle="Dark default · .paper worksheet · .k-dark expo · .k-night stage" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--sans);padding:16px;color:var(--text)}
  .row{display:flex;gap:10px}
  .card{flex:1;border:1px solid var(--hair);border-radius:var(--radius);padding:14px;background:var(--panel);color:var(--text)}
  .card .t{font-family:var(--display);font-size:17px}
  .card .m{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
  .dots{display:flex;gap:6px;margin-top:10px}
  .d{width:14px;height:14px;border-radius:3px}
</style></head>
<body>
  <div class="row">
    <div class="card"><div class="m">default · dark</div><div class="t">The Line</div><div class="dots"><span class="d" style="background:var(--accent)"></span><span class="d" style="background:var(--fire)"></span><span class="d" style="background:var(--ok)"></span></div></div>
    <div class="card paper"><div class="m">.paper · BEO</div><div class="t">Worksheet</div><div class="dots"><span class="d" style="background:var(--accent)"></span><span class="d" style="background:var(--fire)"></span><span class="d" style="background:var(--ok)"></span></div></div>
    <div class="card k-dark"><div class="m">.k-dark · expo</div><div class="t">Wall mount</div><div class="dots"><span class="d" style="background:var(--accent)"></span><span class="d" style="background:var(--fire)"></span><span class="d" style="background:var(--ok)"></span></div></div>
    <div class="card k-night"><div class="m">.k-night · stage</div><div class="t">Event mode</div><div class="dots"><span class="d" style="background:var(--accent)"></span><span class="d" style="background:var(--fire)"></span><span class="d" style="background:var(--ok)"></span></div></div>
  </div>
</body></html>
