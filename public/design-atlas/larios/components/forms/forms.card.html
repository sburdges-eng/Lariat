<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; max-width: 620px; }
  .wide { grid-column: 1 / -1; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Select, Textarea, Field } = window.LariatLaRiOSDesignSystem_5761b2;
function Demo() {
  return (
    <div className="grid">
      <Field label="Item" hint="What ran out"><Input defaultValue="Ribeye 12oz" /></Field>
      <Field label="Station"><Select defaultValue="saute"><option value="saute">Sauté</option><option value="grill">Grill</option><option value="garde">Garde manger</option></Select></Field>
      <Field label="Count" ><Input defaultValue="12" /></Field>
      <Field label="Temp (°F)"><Input invalid defaultValue="45" hint="" /></Field>
      <div className="wide"><Field label="Note"><Textarea rows={2} defaultValue="Low on the brine — pull more from the walk-in before rush." /></Field></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
