appId: com.seanburdges.lariat.cockpit
productName: Lariat
copyright: © 2026 Lariat — kitchen cockpit
artifactName: ${productName}-${version}-${arch}.${ext}

directories:
  output: dist
  buildResources: desktop/icons

files:
  - "desktop/dist/**"
  - "desktop/server-entry.cjs"
  - ".next/**"
  - "!.next/cache/**"
  - "!.next/trace"
  - "!.next/**/*.map"
  - "public/**"
  - "!public/design-atlas/**"
  - "package.json"
  - "version.json"
  - "node_modules/**"
  - "!node_modules/electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/@electron/**"
  - "!node_modules/@electron-forge/**"
  - "!node_modules/@playwright/**"
  - "!node_modules/playwright/**"
  - "!node_modules/playwright-core/**"
  - "!node_modules/typescript/**"
  - "!node_modules/jest/**"
  - "!node_modules/@jest/**"
  - "!node_modules/@types/**"
  - "!node_modules/@testing-library/**"
  - "!node_modules/@huggingface/**"
  - "!node_modules/eslint/**"
  - "!node_modules/@eslint/**"
  - "!node_modules/typescript-eslint/**"
  - "!node_modules/vite/**"
  - "!node_modules/@vitejs/**"
  - "!node_modules/simple-git-hooks/**"
  - "!node_modules/lint-staged/**"
  - "!node_modules/onnxruntime-common/**"
  - "!node_modules/onnxruntime-node/**"
  - "!node_modules/onnxruntime-web/**"
  - "!node_modules/**/*.{md,ts,map}"
  - "!node_modules/**/*.{flow,d.ts,d.cts,d.mts}"
  - "!node_modules/**/{test,tests,__tests__,docs,examples,benchmarks}/**"
  - "!node_modules/**/{LICENSE,license,LICENCE,licence,CHANGELOG,changelog,CONTRIBUTING}*"
  - "!**/test/**"
  - "!**/__tests__/**"
  - "!**/.DS_Store"

asar: false
afterPack: desktop/after-pack-ad-hoc.cjs

mac:
  category: public.app-category.business
  icon: desktop/icons/AppIcon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null                              # TODAY: ad-hoc sign
  # To activate notarization:
  #   1. Set identity to your Developer ID Application string (e.g., "Developer ID Application: Sean Burdges (TEAMID)")
  #   2. Uncomment the afterSign line below
  #   3. Create ~/.lariat-build.env with APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD (app-specific password), APPLE_TEAM_ID
  # afterSign: desktop/notarize.cjs
  entitlements: desktop/entitlements.mac.plist
  entitlementsInherit: desktop/entitlements.mac.plist
  target:
    - dmg
    - zip
  extendInfo:
    LSMinimumSystemVersion: "11.0"
    NSLocalNetworkUsageDescription: "Lariat needs local network access so kitchen iPads can connect to the hub."
    NSBonjourServices:
      - "_lariat._tcp"

dmg:
  title: "Lariat ${version}"
  icon: desktop/icons/AppIcon.icns
  background: desktop/icons/dmg-background.png
  contents:
    - { x: 130, y: 220, type: file }
    - { x: 410, y: 220, type: link, path: /Applications }
  window: { width: 540, height: 380 }
